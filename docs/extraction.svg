<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="440" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- PDF Input -->
  <rect x="250" y="15" width="120" height="42" rx="6" fill="#1e3a5f"/>
  <text x="310" y="32" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">PDF Input</text>
  <text x="310" y="49" text-anchor="middle" fill="#7eb8e0" font-size="10">source document</text>

  <!-- Arrow -->
  <line x1="310" y1="57" x2="310" y2="73" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- pypdf box -->
  <rect x="240" y="75" width="140" height="42" rx="6" fill="#1a4873"/>
  <text x="310" y="92" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">pypdf</text>
  <text x="310" y="109" text-anchor="middle" fill="#7eb8e0" font-size="10">text extraction</text>

  <!-- Arrow -->
  <line x1="310" y1="117" x2="310" y2="133" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Quality Score box -->
  <rect x="175" y="135" width="270" height="110" rx="6" fill="#1e3a5f" stroke="#2d5986" stroke-width="1"/>
  <text x="310" y="153" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Quality Scorer  (0 – 100 pts)</text>
  <line x1="185" y1="160" x2="435" y2="160" stroke="#2d5986" stroke-width="1"/>
  <text x="193" y="175" fill="#90c4e8" font-size="10">chars / page</text>
  <text x="437" y="175" text-anchor="end" fill="#7dd3a8" font-size="10" font-weight="600">30 pts</text>
  <text x="193" y="191" fill="#90c4e8" font-size="10">non-whitespace ratio</text>
  <text x="437" y="191" text-anchor="end" fill="#7dd3a8" font-size="10" font-weight="600">20 pts</text>
  <text x="193" y="207" fill="#90c4e8" font-size="10">printable-char ratio</text>
  <text x="437" y="207" text-anchor="end" fill="#7dd3a8" font-size="10" font-weight="600">20 pts</text>
  <text x="193" y="223" fill="#90c4e8" font-size="10">academic keyword hits</text>
  <text x="437" y="223" text-anchor="end" fill="#7dd3a8" font-size="10" font-weight="600">20 pts</text>
  <text x="193" y="239" fill="#90c4e8" font-size="10">page yield</text>
  <text x="437" y="239" text-anchor="end" fill="#7dd3a8" font-size="10" font-weight="600">10 pts</text>

  <!-- Arrow down to diamond -->
  <line x1="310" y1="245" x2="310" y2="261" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Diamond: center (310,289), hw=80, hh=28 -->
  <polygon points="310,261 390,289 310,317 230,289" fill="#0e4a7a" stroke="#2d7ab8" stroke-width="1.5"/>
  <text x="310" y="285" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">score ≥ 60 ?</text>
  <text x="310" y="300" text-anchor="middle" fill="#7eb8e0" font-size="9">threshold</text>

  <!-- YES path (left) -->
  <polyline points="230,289 120,289 120,357" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="174" y="282" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">YES</text>

  <!-- NO path (right) -->
  <polyline points="390,289 490,289 490,357" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="446" y="282" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">NO</text>

  <!-- pypdf result -->
  <rect x="58" y="359" width="124" height="46" rx="6" fill="#166534"/>
  <text x="120" y="377" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">pypdf text</text>
  <text x="120" y="395" text-anchor="middle" fill="#86efac" font-size="10">~1 s / paper</text>

  <!-- DocStruct OCR -->
  <rect x="428" y="359" width="134" height="46" rx="6" fill="#7c2d12"/>
  <text x="495" y="377" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">DocStruct OCR</text>
  <text x="495" y="395" text-anchor="middle" fill="#fca5a5" font-size="10">~2 – 10 min / paper</text>

  <!-- Caption -->
  <line x1="15" y1="418" x2="605" y2="418" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="431" text-anchor="middle" fill="#94a3b8" font-size="9">Fig. 2 — Smart extraction: five-signal quality scoring selects pypdf fast-path or DocStruct OCR</text>
</svg>
